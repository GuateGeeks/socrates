services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    env_file: .env
    environment:
      DATABASE_URL: postgresql://socrates:${POSTGRES_PASSWORD}@db:5432/socrates
      REDIS_URL: redis://redis:6379

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: worker
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    env_file: .env
    environment:
      DATABASE_URL: postgresql://socrates:${POSTGRES_PASSWORD}@db:5432/socrates
      REDIS_URL: redis://redis:6379

  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: socrates
      POSTGRES_USER: socrates
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U socrates"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"

volumes:
  postgres_data:
  redis_data:

services:
  app:
    build:
      target: deps
    command: ["npm", "run", "dev"]
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    environment:
      NODE_ENV: development

  worker:
    build:
      target: deps
    command: ["npm", "run", "worker"]
    volumes:
      - .:/app
      - /app/node_modules
